# ARC System — Context Definition
# The meta-layer where ARC manages itself

id: system
title: System
description: The meta-layer where ARC manages itself — contexts, types, fields, agents, and configuration.

# ─── Application ────────────────────────────────────────────────────────────
application:
  routes:
    public: null
    admin: /dashboard/system
  nav:
    label: System
    icon: Settings
    group: system
  entryTypes:
    - agents
    - roles
    - access
    - environments
    - extensions
    - providers
    - forms
    - lab
    - docs
  defaultView: null
  features:
    publicSite: false
    rss: false
    search: false

# ─── Presentation ───────────────────────────────────────────────────────────
presentation:
  theme: system
  layout: admin
  palette:
    primary: "#1a1a1a"
    accent: "#6366f1"
    background: "#f8f8f8"
    surface: "#ffffff"
    text: "#1a1a1a"
    textMuted: "#666666"
  typography:
    heading: "Inter"
    body: "Inter"
  density: compact

# ─── Structure ──────────────────────────────────────────────────────────────
structure:
  primaryType: agents
  types:
    - id: agent
      schema: ./types/agent.yaml
      listView: list
      sortDefault: handle-asc
    - id: role
      schema: ./types/role.yaml
      listView: list
      sortDefault: id-asc
    - id: access
      schema: ./types/access.yaml
      listView: list
      sortDefault: agentHandle-asc
  # Remaining system types (environments, extensions, providers, forms, lab, docs)
  # are currently managed in ARC itself via migrations.ts and seed-initializer.ts.
  # These will be migrated to YAML schemas as the data model matures.

# ─── Data ───────────────────────────────────────────────────────────────────
data:
  # Agents, roles, and access are stored in arc-data (source of truth)
  provider: github
  owner: bldrs
  repo: arc-data
  branch: main
  path: contexts/system/data
  # All other system data (environments, providers, etc.) remains in browser localStorage
  localFallback:
    provider: local
    source: system-data
    note: >
      Non-agent system data (environments, providers, extensions, forms)
      is stored locally in the browser until GitHub sync is extended to cover it.
